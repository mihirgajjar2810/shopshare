{% extends 'base.html' %}

{% block title %}Login | ShopShare{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-4">
        <div class="card bg-dark border-secondary shadow">
            <div class="card-body p-5">
                <h2 class="text-center text-white mb-4">Welcome Back</h2>

                <!-- Messages / Alerts -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label text-secondary">Username</label>
                        <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-secondary">Password</label>
                        <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                    </div>

                    <button type="submit" class="btn btn-warning w-100 mb-3">Login</button>
                </form>

                <div class="text-center mt-3">
                    <p class="text-secondary mb-0">Don't have an account? <a href="{% url 'register' %}" class="text-warning text-decoration-none">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
