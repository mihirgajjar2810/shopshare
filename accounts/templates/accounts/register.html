{% extends 'base.html' %}

{% block title %}Register | ShopShare{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card bg-dark border-secondary shadow">
            <div class="card-body p-5">
                <h2 class="text-center text-white mb-4">Create an Account</h2>

                <!-- Messages / Alerts -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST" action="{% url 'register' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label text-secondary">Username</label>
                        <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary">Email Address</label>
                        <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary">Password</label>
                        <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control bg-dark text-white border-secondary" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-secondary">I want to register as a:</label>
                        <select name="role" class="form-select bg-dark text-white border-secondary">
                            <option value="customer">Customer</option>
                            <option value="shopkeeper">Shopkeeper / Vendor</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-warning w-100">Register</button>
                </form>

                <div class="mt-4 text-center">
                    <p class="text-secondary mb-0">Already have an account? <a href="{% url 'login' %}" class="text-warning text-decoration-none">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
