{% extends 'base.html' %}

{% block title %}Delete {{ product.name }} | ShopShare{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark border-danger shadow-sm text-center">
                <div class="card-body p-5">
                    <div class="display-1 text-danger mb-4">
                        <i class="bi bi-exclamation-triangle"></i>
                    </div>
                    <h3 class="text-white mb-3">Delete Product</h3>
                    <p class="text-secondary mb-4">
                        Are you sure you want to permanently delete <strong>"{{ product.name }}"</strong>? This action cannot be undone.
                    </p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url 'shopkeeper_dashboard' %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
                            <button type="submit" class="btn btn-danger btn-lg">Yes, Delete</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
